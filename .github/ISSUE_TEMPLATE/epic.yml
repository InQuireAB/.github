name: Epic
description: A major capability or initiative that spans multiple Work Items
title: "[Epic]: "
labels:
  - epic
body:
  - type: markdown
    attributes:
      value: |
        Use for large outcomes that need multiple Work Items to finish.
        Do not branch from Epics. Break them into Work Items instead.
  - type: input
    id: customer
    attributes:
      label: Customer
      placeholder: Customer name
  - type: input
    id: contact
    attributes:
      label: Contact person
  - type: input
    id: meeting-date
    attributes:
      label: Meeting date
      placeholder: YYYY-MM-DD
  - type: textarea
    id: background
    attributes:
      label: Background
      description: Describe the context behind the need.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem is the customer trying to solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this Epic is complete?
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: User story (optional)
      description: Use when a story framing helps. Skip for technical or platform Epics.
      placeholder: |
        As a <user>
        I want <capability>
        so that <benefit>
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (draft)
      placeholder: |
        - [ ]
  - type: textarea
    id: open-questions
    attributes:
      label: Open questions
      placeholder: |
        - [ ]
  - type: textarea
    id: notes
    attributes:
      label: Notes from meeting
      description: Free text, links, screenshots, or documents.
