# Canonical label contract for InQuireAB repositories.
# Synced to target repos via .github/workflows/sync-labels.yml
#
# Issue Types (Epic, Work Item, Bug) handle primary classification. Labels here
# cover only subtypes and ceremony markers that Issue Types cannot express.
#
# Colors are chosen for colorblind accessibility: blue/orange/gray/purple/gold
# differ in hue and brightness, not just pale cyan/teal variants.
labels:
  - name: feature
    color: "#0075ca"
    description: Work Item subtype for customer-facing capability

  - name: task
    color: "#e9963d"
    description: Work Item subtype for technical or internal work

  - name: sprint-meta
    color: "#5319e7"
    description: Ceremony issue for sprint plan and scope tracking, not execution work

  - name: internal
    color: "#cfd3d7"
    description: Non user-facing enabling work

  - name: chore
    color: "#fbca04"
    description: Maintenance or housekeeping work
