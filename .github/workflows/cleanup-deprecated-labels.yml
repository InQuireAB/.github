name: Cleanup deprecated issue labels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: List changes without applying them
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.read.outputs.repos }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          repos=$(grep -v '^\s*$' .github/repos-label-sync.txt | grep -v '^\s*#' | jq -R . | jq -s -c .)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.prepare.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
      - name: Remove deprecated labels from issues and pull requests
        env:
          GH_TOKEN: ${{ secrets.ORG_LABEL_SYNC_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash .github/scripts/cleanup-deprecated-issue-labels.sh "${{ matrix.repo }}"
